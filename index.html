<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Web Page</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <header>
        <h1>My Responsive Website</h1>
    </header>

    <main class="container">
        <section class="content">
            <h2>Main Content</h2>
            <p>
                This is the main content area. Resize the browser window to
                see how the layout changes for different screen sizes.
            </p>
        </section>

        <aside class="sidebar">
            <h2>Sidebar</h2>
            <p>
                This sidebar moves below the content on smaller screens.
            </p>
        </aside>
    </main>

    <footer>
        <p>&copy; 2026 My Responsive Website. All Rights Reserved.</p>
    </footer>

</body>
</html>
